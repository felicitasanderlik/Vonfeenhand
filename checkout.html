<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellung – von Feenhand</title>
<link rel="stylesheet" href="style.css">
<style>
  .checkout-wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 120px 1.5rem 5rem;
  }
  .checkout-section {
    background: white;
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .checkout-section h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 1.2rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .form-group { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1rem; }
  .form-group label { font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-light); }
  .form-group input {
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--sage); }
  .payment-options { display:flex; flex-direction:column; gap:0.6rem; }
  .payment-option {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.9rem 1rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .payment-option.selected { border-color: var(--sage); background: var(--sage-pale); }
  .payment-option input[type=radio] { accent-color: var(--sage); }
  .payment-label { font-size: 0.88rem; }
  .payment-sub { font-size: 0.72rem; color: var(--text-light); }
  .order-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
  }
  .order-item:last-child { border-bottom: none; }
  .order-item-img {
    width: 48px; height: 48px;
    background: var(--sage-pale);
    border-radius: 2px; flex-shrink: 0; overflow: hidden;
  }
  .order-item-img img { width:100%; height:100%; object-fit:cover; }
  .order-item-name { flex:1; font-size:0.85rem; }
  .order-item-qty { font-size:0.75rem; color:var(--text-light); }
  .order-item-price { font-size:0.85rem; font-family:'Cormorant Garamond',serif; }
  .order-total {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 1rem; margin-top: 0.5rem;
    border-top: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
  }
  .btn-order {
    width: 100%; padding: 1rem;
    background: #6b8f6b; color: white;
    border: none; border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem; letter-spacing: 0.14em;
    text-transform: uppercase; cursor: pointer;
    margin-top: 1rem; transition: background 0.2s;
  }
  .btn-order:hover { background: #5a7a5a; }
  .btn-order:disabled { background: var(--border); cursor: not-allowed; }
  .checkout-note {
    font-size: 0.72rem; color: var(--text-light);
    text-align: center; margin-top: 0.8rem;
    line-height: 1.6;
  }
  .color-dots { display:flex; gap:3px; margin-top:2px; }
  .color-dot { width:10px; height:10px; border-radius:50%; border:1px solid rgba(0,0,0,0.1); }
</style>
</head>
<body>
<div class="checkout-wrap">
  <div class="page-hero" style="padding:0 0 2rem;">
    <div class="section-tag">Bestellung</div>
    <h1 style="font-size:2rem;">Deine <em>Bestellung</em></h1>
  </div>

  <!-- Bestellübersicht -->
  <div class="checkout-section">
    <h3>Warenkorb</h3>
    <div id="orderItems"></div>
    <div class="order-total">
      <span>Gesamt</span>
      <span id="orderTotal">€ 0,00</span>
    </div>
  </div>

  <!-- Kundendaten -->
  <div class="checkout-section">
    <h3>Deine Daten</h3>
    <div class="form-group">
      <label>Vor- und Nachname *</label>
      <input type="text" id="co_name" placeholder="Maria Muster" required>
    </div>
    <div class="form-group">
      <label>E-Mail *</label>
      <input type="email" id="co_email" placeholder="deine@email.at" required>
    </div>
    <div class="form-group">
      <label>Telefon</label>
      <input type="tel" id="co_phone" placeholder="+43 123 456 789">
    </div>
    <div class="form-group">
      <label>Adresse *</label>
      <input type="text" id="co_address" placeholder="Musterstraße 1, 1010 Wien" required>
    </div>
  </div>

  <!-- Zahlungsmittel -->
  <div class="checkout-section">
    <h3>Zahlungsmittel</h3>
    <div class="payment-options">
      <label class="payment-option selected" id="opt-transfer" onclick="selectPayment('transfer')">
        <input type="radio" name="payment" value="transfer" checked>
        <div>
          <div class="payment-label">🏦 Vorausüberweisung</div>
          <div class="payment-sub">Bankdaten erhalten Sie per E-Mail nach der Bestellung</div>
        </div>
      </label>
      <label class="payment-option" id="opt-paypal" onclick="selectPayment('paypal')">
        <input type="radio" name="payment" value="paypal">
        <div>
          <div class="payment-label">💳 PayPal</div>
          <div class="payment-sub">Weiterleitung zu PayPal nach Bestätigung</div>
        </div>
      </label>
    </div>
  </div>

  <button class="btn-order" id="orderBtn" onclick="placeOrder()">JETZT BESTELLEN</button>
  <p class="checkout-note">
    Mit deiner Bestellung stimmst du unseren AGB und der Datenschutzerklärung zu.<br>
    Handgefertigt in Wien · jedes Stück ein Unikat.
  </p>
</div>

<script src="header.js"></script>
<script src="app.js"></script>
<script>
const SB_URL = 'https://uveihedjoqrdejycqqeu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2ZWloZWRqb3FyZGVqeWNxcWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTA4MDYsImV4cCI6MjA5MTQ4NjgwNn0.H6k7qrc_YMWgvKDqk-_nIYKQjJqVogBgx6EUFOTIhvo';

// EmailJS
const EMAILJS_PUBLIC_KEY  = 'DEIN_PUBLIC_KEY';
const EMAILJS_SERVICE_ID  = 'DEIN_SERVICE_ID';
const EMAILJS_TEMPLATE_CUSTOMER = 'DEIN_TEMPLATE_KUNDE';
const EMAILJS_TEMPLATE_FELICITAS = 'DEIN_TEMPLATE_FELICITAS';

let selectedPayment = 'transfer';

function selectPayment(method) {
  selectedPayment = method;
  document.getElementById('opt-transfer').classList.toggle('selected', method === 'transfer');
  document.getElementById('opt-paypal').classList.toggle('selected', method === 'paypal');
}

function renderOrderItems() {
  const cart = JSON.parse(localStorage.getItem('vfh_cart') || '[]');
  const el = document.getElementById('orderItems');
  if (!cart.length) { window.location.href = 'shop.html'; return; }

  el.innerHTML = cart.map(item => `
    <div class="order-item">
      <div class="order-item-img">
        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : ''}
      </div>
      <div style="flex:1;">
        <div class="order-item-name">${item.name}</div>
        ${item.colors && item.colors.length ? `<div class="color-dots">${item.colors.map(c => `<div class="color-dot" style="background:${c};"></div>`).join('')}</div>` : ''}
        <div class="order-item-qty">${item.qty}x</div>
      </div>
      <div class="order-item-price">€ ${(item.price * item.qty).toFixed(2).replace('.',',')}</div>
    </div>
  `).join('');

  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  document.getElementById('orderTotal').textContent = '€ ' + total.toFixed(2).replace('.',',');
}

async function placeOrder() {
  const name = document.getElementById('co_name').value.trim();
  const email = document.getElementById('co_email').value.trim();
  const phone = document.getElementById('co_phone').value.trim();
  const address = document.getElementById('co_address').value.trim();

  if (!name || !email || !address) {
    showToast('Bitte alle Pflichtfelder ausfüllen', 'error');
    return;
  }

  const btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.textContent = 'Wird verarbeitet...';

  const cart = JSON.parse(localStorage.getItem('vfh_cart') || '[]');
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);

  try {
    // Bestellung in Supabase speichern
    const res = await fetch(`${SB_URL}/rest/v1/orders`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({
        customer_name: name,
        customer_email: email,
        customer_phone: phone,
        customer_address: address,
        items: cart,
        total,
        payment_method: selectedPayment,
        payment_status: 'pending'
      })
    });
    const order = await res.json();
    const orderId = order[0]?.id?.slice(0,8).toUpperCase() || '------';

    // Artikel aus Warenkorb als Liste
    const itemList = cart.map(i => `${i.qty}x ${i.name} – € ${(i.price*i.qty).toFixed(2).replace('.',',')} `).join('\n');
    const paymentText = selectedPayment === 'transfer'
      ? 'Vorausüberweisung\nBankdaten:\nInhaberin: Felicitas Anderlik\nIBAN: AT12 3456 7890 1234 5678\nVerwendungszweck: Bestellung ' + orderId
      : 'PayPal – du erhältst einen Link per E-Mail';

    // EmailJS - Mail an Kunden
    if (EMAILJS_PUBLIC_KEY !== 'DEIN_PUBLIC_KEY') {
      emailjs.init(EMAILJS_PUBLIC_KEY);
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_CUSTOMER, {
        to_name: name,
        to_email: email,
        order_id: orderId,
        items: itemList,
        total: '€ ' + total.toFixed(2).replace('.',','),
        payment: paymentText,
        address
      });
      // Mail an Felicitas
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_FELICITAS, {
        customer_name: name,
        customer_email: email,
        customer_phone: phone || '–',
        customer_address: address,
        order_id: orderId,
        items: itemList,
        total: '€ ' + total.toFixed(2).replace('.',','),
        payment: selectedPayment === 'transfer' ? 'Vorausüberweisung' : 'PayPal'
      });
    }

    // Warenkorb leeren
    localStorage.removeItem('vfh_cart');
    await releaseAllStock();
    launchConfetti();

    // Danke-Seite
    document.querySelector('.checkout-wrap').innerHTML = `
      <div style="text-align:center;padding:3rem 0;">
        <div style="font-size:3rem;margin-bottom:1rem;">🎉</div>
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin-bottom:0.5rem;">Danke, ${name.split(' ')[0]}!</h1>
        <p style="color:var(--text-light);margin-bottom:0.5rem;">Deine Bestellung <strong>#${orderId}</strong> wurde erfolgreich aufgegeben.</p>
        <p style="color:var(--text-light);margin-bottom:2rem;">Du erhältst eine Bestätigung an <strong>${email}</strong>.</p>
        ${selectedPayment === 'transfer' ? `
        <div style="background:var(--sage-pale);border-radius:4px;padding:1.2rem;text-align:left;margin-bottom:2rem;font-size:0.85rem;line-height:1.8;">
          <strong>Bankdaten für die Überweisung:</strong><br>
          Inhaberin: Felicitas Anderlik<br>
          IBAN: AT12 3456 7890 1234 5678<br>
          Verwendungszweck: Bestellung #${orderId}
        </div>` : ''}
        <a href="shop.html" class="btn btn-primary" style="text-decoration:none;">Weiter einkaufen</a>
      </div>`;

  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'JETZT BESTELLEN';
    showToast('Fehler beim Bestellen: ' + e.message, 'error');
  }
}

renderOrderItems();
</script>
</body>
</html>
