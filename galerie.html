<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie – von Feenhand</title>
<link rel="stylesheet" href="style.css">
<style>
  .galerie-controls { padding: 2rem 5rem 0; display: flex; gap: 0.5rem; flex-wrap: wrap; }
  @media (max-width: 768px) {
    .galerie-controls { flex-wrap: nowrap !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch; padding: 1rem 1rem 0 !important; scrollbar-width: none; }
    .galerie-controls::-webkit-scrollbar { display: none; }
    .galerie-masonry { columns: 2 !important; padding: 1rem 1rem 3rem !important; gap: 8px; }
    .g-item { margin-bottom: 8px; }
    .g-item img { aspect-ratio: 1/1; object-fit: cover; width: 100%; }
  }
  .g-filter { padding: 0.38rem 1rem; border: 1px solid var(--border); background: none; font-family: 'Jost', sans-serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); cursor: pointer; border-radius: 20px; transition: all 0.2s; }
  .g-filter.active, .g-filter:hover { background: var(--sage); border-color: var(--sage); color: white; }
  .galerie-masonry { padding: 2rem 5rem 5rem; columns: 3; column-gap: 1.2rem; }
  .g-item { break-inside: avoid; margin-bottom: 1.2rem; border-radius: 2px; overflow: hidden; }
  .g-item img { width: 100%; display: block; border-radius: 2px; }
  .g-item-title { padding: 0.3rem 0.2rem; font-size: 0.72rem; color: var(--text-light); }
  @media (max-width: 900px) { .galerie-controls { padding: 2rem 1.5rem 0; } .galerie-masonry { columns: 2; padding: 2rem 1.5rem 4rem; } }
  @media (max-width: 560px) { .galerie-masonry { columns: 1; } }
  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 999;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img {
    max-width: 92vw; max-height: 88vh;
    object-fit: contain;
    border-radius: 2px;
    transform: scale(0.95);
    transition: transform 0.3s;
  }
  .lightbox.open img { transform: scale(1); }
  .lightbox-close {
    position: absolute; top: 1rem; right: 1rem;
    background: rgba(255,255,255,0.15);
    border: none; color: white;
    width: 40px; height: 40px;
    border-radius: 50%; font-size: 1.1rem;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .lightbox-title {
    position: absolute; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 0.78rem; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="page-content">
  <div class="page-hero">
    <div class="section-tag">Galerie</div>
    <h1>Einblicke in<br><em>meine Werkstatt.</em></h1>
  </div>
  <div class="galerie-controls">
    <button class="g-filter active" onclick="gFilter(this,'alle')">Alle</button>
  </div>
  <div class="galerie-masonry" id="galerieGrid">
    <div style="padding:3rem;text-align:center;color:var(--text-light);font-style:italic;">Wird geladen...</div>
  </div>
</div>
<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-title" id="lightboxTitle"></div>
</div>

<script src="header.js"></script>
<script src="app.js"></script>
<script>
const SB_URL = 'https://uveihedjoqrdejycqqeu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2ZWloZWRqb3FyZGVqeWNxcWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTA4MDYsImV4cCI6MjA5MTQ4NjgwNn0.H6k7qrc_YMWgvKDqk-_nIYKQjJqVogBgx6EUFOTIhvo';
let allItems = [], currentCat = 'alle';

async function loadGalerie() {
  try {
    const res = await fetch(SB_URL + '/rest/v1/gallery?order=sort_order.asc,created_at.desc', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    allItems = await res.json();
    const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))];
    const controls = document.querySelector('.galerie-controls');
    controls.innerHTML = '<button class="g-filter active" onclick="gFilter(this,\'alle\')">Alle</button>';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'g-filter';
      btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      btn.onclick = function() { gFilter(this, cat); };
      controls.appendChild(btn);
    });
    renderGalerie();
  } catch(e) {
    document.getElementById('galerieGrid').innerHTML = '<div style="padding:3rem;text-align:center;">Fehler beim Laden</div>';
  }
}

function renderGalerie() {
  const grid = document.getElementById('galerieGrid');
  const filtered = currentCat === 'alle' ? allItems : allItems.filter(i => i.category === currentCat);
  if (!filtered.length) { grid.innerHTML = '<div style="padding:3rem;text-align:center;font-style:italic;">Keine Bilder</div>'; return; }
  grid.innerHTML = filtered.map(item => `
    <div class="g-item" onclick="openLightbox('${SB_URL}/storage/v1/object/public/images/${item.image_url}','${(item.title||'').replace(/'/g,"\\'")}')">
      <img src="${SB_URL}/storage/v1/object/public/images/${item.image_url}" alt="${item.title||''}" loading="lazy">
      ${item.title ? `<div class="g-item-title">${item.title}</div>` : ''}
    </div>`).join('');
}

function gFilter(btn, cat) {
  currentCat = cat;
  document.querySelectorAll('.g-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGalerie();
}

loadGalerie();

function openLightbox(src, title) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxTitle').textContent = title;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox({target: document.getElementById('lightbox')}); });
</script>
</body>
</html>
