<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produkt – von Feenhand</title>
<link rel="stylesheet" href="style.css">
<style>
  .product-page {
    padding-top: 160px;
    min-height: 100vh;
  }

  .product-back {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    padding: 1rem 2rem;
    transition: color 0.2s;
    cursor: pointer;
    background: none;
    border: none;
  }
  .product-back:hover { color: var(--sage-dark); }

  .product-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    padding: 1rem 4rem 5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── BILDER ── */
  .product-gallery { position: sticky; top: 180px; }
  .product-main-img {
    aspect-ratio: 1;
    background: var(--sage-pale);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 0.8rem;
    position: relative;
  }
  .product-main-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: opacity 0.3s;
  }
  .product-thumbs {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .product-thumb {
    width: 64px; height: 64px;
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }
  .product-thumb.active { border-color: var(--sage); }
  .product-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* ── INFO ── */
  .product-info-col {}
  .product-cat-tag {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.5rem;
  }
  .product-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 0.8rem;
  }
  .product-price-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 300;
    margin-bottom: 1.5rem;
    color: var(--text);
  }
  .product-desc-text {
    font-size: 0.95rem;
    font-weight: 300;
    line-height: 1.9;
    color: var(--text-light);
    margin-bottom: 2rem;
  }

  /* ── FARBEN ── */
  .product-section-label {
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 0.8rem;
    display: block;
  }
  .color-display {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .color-circle-preview {
    cursor: pointer;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .color-circle-preview:hover { transform: scale(1.1); }

  /* ── INDIVIDUALISIERUNG ── */
  .custom-section {
    background: var(--sage-pale);
    border-radius: 6px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1.5rem;
  }
  .custom-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    margin-bottom: 0;
  }
  .custom-section-title {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--sage-dark);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .custom-price-badge {
    font-size: 0.72rem;
    background: var(--sage);
    color: white;
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
  }
  .custom-panel {
    margin-top: 1rem;
    display: none;
  }
  .custom-panel.open { display: block; }
  .custom-hint {
    font-size: 0.78rem;
    color: var(--text-light);
    margin-bottom: 0.8rem;
  }

  /* Farbauswahl für Kunden */
  .customer-color-layout {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .cust-layout-btn {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 50%;
    padding: 3px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .cust-layout-btn.active { border-color: var(--sage); }

  .customer-slots {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.8rem;
    align-items: center;
  }
  .cust-slot {
    width: 44px; height: 28px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 0.65rem;
    color: white;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .cust-slot.active-slot { border-color: var(--sage-dark); box-shadow: 0 0 0 2px var(--sage-pale); }

  .customer-palette {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    padding: 0.8rem;
    background: var(--white);
    border-radius: 4px;
    margin-bottom: 0.8rem;
  }
  .cust-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .cust-swatch.selected { border-color: var(--sage); transform: scale(1.15); }
  .cust-swatch:hover { transform: scale(1.1); }

  .custom-preview {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 0.5rem;
  }

  /* ── WARENKORB ── */
  .add-to-cart-section {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    margin-top: 1.5rem;
  }
  .stock-info {
    font-size: 0.78rem;
    color: var(--text-light);
  }
  .stock-info.low { color: #e67e22; }
  .stock-info.out { color: var(--danger); }

  .btn-add-large {
    padding: 1rem 2rem;
    background: var(--sage);
    color: white;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
    width: 100%;
  }
  .btn-add-large:hover { background: var(--sage-dark); }
  .btn-add-large:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; }

  /* ── LOADING ── */
  .product-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
    color: var(--text-light);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
  }

  @media (max-width: 900px) {
    .product-layout {
      grid-template-columns: 1fr;
      padding: 1rem 1.5rem 4rem;
      gap: 2rem;
    }
    .product-gallery { position: static; }
    .product-back { padding: 0.8rem 1.5rem; }
  }
</style>
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="nav-brand">
    <img src="logo.png" alt="von Feenhand Logo">
    <div class="nav-wordmark">
      <span style="font-family:'Raleway',sans-serif;font-weight:300;font-size:0.72rem;letter-spacing:0.12em;">von</span>
      <span style="font-family:'Tangerine',cursive;font-weight:700;font-size:2.6rem;line-height:1;">feenhand</span>
      <span style="font-family:'Raleway',sans-serif;font-weight:300;font-size:0.72rem;letter-spacing:0.12em;">gemacht</span>
    </div>
  </a>
  <button class="nav-burger" onclick="toggleBurger()" id="burgerBtn">
    <span></span><span></span><span></span>
  </button>
  <div class="burger-dropdown" id="burgerDropdown">
    <a href="about.html">Über mich</a>
    <a href="galerie.html">Galerie</a>
    <a href="shop.html">Shop</a>
    <a href="kontakt.html">Kontakt</a>
  </div>
  <button class="nav-cart-fixed" onclick="toggleCart()" aria-label="Warenkorb">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    <span class="cart-badge" id="cartBadge"></span>
  </button>
  <div class="nav-bottom">
    <ul class="nav-links">
      <li><a href="about.html">Über mich</a></li>
      <li><a href="galerie.html">Galerie</a></li>
      <li><a href="shop.html" class="active">Shop</a></li>
      <li><a href="kontakt.html">Kontakt</a></li>
    </ul>
  </div>
</nav>

<div class="product-page">
  <button class="product-back" onclick="history.back()">← Zurück zum Shop</button>
  <div id="productContent" class="product-loading">Wird geladen...</div>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-head"><h3>Warenkorb</h3><button class="btn-close" onclick="closeCart()">✕</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-total"><span>Gesamt</span><span class="cart-total-amount" id="cartTotal">€ 0,00</span></div>
    <div class="cart-actions">
      <button class="btn-paypal" onclick="checkoutPaypal()">💳 Mit PayPal bezahlen</button>
      <button class="btn-transfer" onclick="checkoutTransfer()">Per Vorausüberweisung</button>
    </div>
    <p class="cart-note">Versand österreichweit · inkl. MwSt.</p>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><button class="modal-close-btn" onclick="closeModal()">✕</button><div id="modalContent"></div></div></div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
const SB_URL = 'https://uveihedjoqrdejycqqeu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2ZWloZWRqb3FyZGVqeWNxcWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTA4MDYsImV4cCI6MjA5MTQ4NjgwNn0.H6k7qrc_YMWgvKDqk-_nIYKQjJqVogBgx6EUFOTIhvo';

let product = null;
let custSlots = ['#CCCCCC'];
let custActiveSlot = 0;
let custLayout = 1;
let currentImgIndex = 0;

function getImageUrl(path) {
  if (!path) return null;
  if (path.startsWith('http')) return path;
  return `${SB_URL}/storage/v1/object/public/images/${path}`;
}

// Farb-Kreis SVG
function colorCircleSVG(colorData, size = 32) {
  if (!colorData || !colorData.colors) return '';
  const n = colorData.colors.length;
  const slotH = (size - 4) / n;
  let rects = '';
  for (let i = 0; i < n; i++) {
    rects += `<rect x="2" y="${2 + i * slotH}" width="${size-4}" height="${slotH}" fill="${colorData.colors[i]}"/>`;
  }
  const r = (size-4)/2, cx = size/2, cy = size/2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;">
    <defs><clipPath id="cp${size}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath></defs>
    <g clip-path="url(#cp${size})">${rects}</g>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ddd" stroke-width="1.5"/>
  </svg>`;
}

// Produkt laden
async function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { document.getElementById('productContent').innerHTML = '<div class="product-loading">Produkt nicht gefunden.</div>'; return; }

  try {
    const res = await fetch(`${SB_URL}/rest/v1/products?id=eq.${id}`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const data = await res.json();
    if (!data || !data[0]) { document.getElementById('productContent').innerHTML = '<div class="product-loading">Produkt nicht gefunden.</div>'; return; }
    product = data[0];
    renderProduct();
  } catch(e) {
    document.getElementById('productContent').innerHTML = '<div class="product-loading">Fehler beim Laden.</div>';
  }
}

function renderProduct() {
  const p = product;
  const colorData = p.color_data ? JSON.parse(p.color_data) : null;
  const customColors = p.custom_colors || [];
  const images = p.images || [];

  document.title = `${p.name} – von Feenhand`;

  const stockInfo = p.stock === 0
    ? '<span class="stock-info out">Ausverkauft</span>'
    : p.stock <= 3
    ? `<span class="stock-info low">Nur noch ${p.stock} verfügbar</span>`
    : `<span class="stock-info">${p.stock} verfügbar</span>`;

  // Bilder
  const mainImg = images[0]
    ? `<img id="mainImg" src="${getImageUrl(images[0])}" alt="${p.name}">`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--sage);opacity:0.3;">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="16" width="48" height="36" rx="2"/><circle cx="24" cy="30" r="6"/><path d="M8 42l12-10 10 8 8-6 18 18"/></svg>
       </div>`;

  const thumbs = images.length > 1 ? `
    <div class="product-thumbs">
      ${images.map((img, i) => `
        <div class="product-thumb ${i===0?'active':''}" onclick="switchImage(${i})">
          <img src="${getImageUrl(img)}" alt="">
        </div>
      `).join('')}
    </div>` : '';

  // Farben
  const colorSection = colorData ? `
    <span class="product-section-label">Farbe</span>
    <div class="color-display">
      ${colorCircleSVG(colorData, 44)}
      <span style="font-size:0.8rem;color:var(--text-light);">${colorData.colors.join(' · ')}</span>
    </div>` : '';

  // Individualisierung
  const customSection = p.customizable ? `
    <div class="custom-section">
      <div class="custom-section-header" onclick="toggleCustomPanel()">
        <span class="custom-section-title">
          ✦ Individualisierbar
          <span class="custom-price-badge">+€ ${(p.custom_price||0).toFixed(2).replace('.',',')}</span>
        </span>
        <span id="customChevron" style="color:var(--sage-dark);font-size:1rem;">▾</span>
      </div>
      <div class="custom-panel" id="customPanel">
        <p class="custom-hint">Wähle deine eigene Farbkombination:</p>

        <!-- Layout Auswahl -->
        <div class="customer-color-layout">
          ${[1,2,3,4].map(n => `
            <button type="button" class="cust-layout-btn ${n===1?'active':''}" data-slots="${n}" onclick="setCustLayout(${n},this)" title="${n} Farbe${n>1?'n':''}">
              ${layoutSVG(n, 28)}
            </button>`).join('')}
        </div>

        <!-- Slots -->
        <div class="customer-slots" id="custSlotRow">
          <span style="font-size:0.68rem;color:var(--text-light);letter-spacing:0.1em;text-transform:uppercase;">Bereich:</span>
          <div id="custSlots" style="display:flex;gap:0.4rem;"></div>
          <div style="margin-left:auto;" id="custPreview"></div>
        </div>

        <!-- Palette -->
        <div class="customer-palette" id="custPalette">
          ${customColors.map(hex => `
            <div class="cust-swatch" data-color="${hex}" style="background:${hex};" onclick="selectCustColor(this)" title="${hex}"></div>
          `).join('')}
        </div>
      </div>
    </div>` : '';

  document.getElementById('productContent').innerHTML = `
    <div class="product-layout">
      <div class="product-gallery">
        <div class="product-main-img">${mainImg}</div>
        ${thumbs}
      </div>
      <div class="product-info-col">
        <div class="product-cat-tag">${p.category || ''}</div>
        <h1 class="product-title">${p.name}</h1>
        <div class="product-price-display" id="priceDisplay">€ ${(p.price||0).toFixed(2).replace('.',',')}</div>
        <p class="product-desc-text">${p.description || ''}</p>
        ${colorSection}
        ${customSection}
        <div class="add-to-cart-section">
          ${stockInfo}
          <button class="btn-add-large" onclick="addProductToCart()" ${p.stock === 0 ? 'disabled' : ''}>
            ${p.stock === 0 ? 'Ausverkauft' : 'In den Warenkorb'}
          </button>
        </div>
      </div>
    </div>`;

  // Init Custom
  if (p.customizable) {
    custSlots = ['#CCCCCC'];
    custActiveSlot = 0;
    custLayout = 1;
    renderCustSlots();
    updateCustPreview();
  }
}

function layoutSVG(n, size) {
  const slotH = (size-4)/n;
  let rects = '';
  const grays = ['#ddd','#ccc','#bbb','#aaa'];
  for (let i=0; i<n; i++) rects += `<rect x="2" y="${2+i*slotH}" width="${size-4}" height="${slotH}" fill="${grays[i]}"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><clipPath id="lc${n}${size}"><circle cx="${size/2}" cy="${size/2}" r="${(size-4)/2}"/></clipPath></defs>
    <g clip-path="url(#lc${n}${size})">${rects}</g>
    <circle cx="${size/2}" cy="${size/2}" r="${(size-4)/2}" fill="none" stroke="#ccc" stroke-width="1"/>
  </svg>`;
}

function switchImage(i) {
  currentImgIndex = i;
  const mainImg = document.getElementById('mainImg');
  if (mainImg) mainImg.src = getImageUrl(product.images[i]);
  document.querySelectorAll('.product-thumb').forEach((t,idx) => t.classList.toggle('active', idx===i));
}

function toggleCustomPanel() {
  const panel = document.getElementById('customPanel');
  const chevron = document.getElementById('customChevron');
  panel.classList.toggle('open');
  chevron.textContent = panel.classList.contains('open') ? '▴' : '▾';
  updatePriceDisplay();
}

function updatePriceDisplay() {
  const panel = document.getElementById('customPanel');
  const isOpen = panel && panel.classList.contains('open');
  const base = product.price || 0;
  const extra = isOpen ? (product.custom_price || 0) : 0;
  const display = document.getElementById('priceDisplay');
  if (display) display.textContent = `€ ${(base + extra).toFixed(2).replace('.',',')}`;
}

// Kunden Farbauswahl
function setCustLayout(n, btn) {
  custLayout = n;
  document.querySelectorAll('.cust-layout-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  while (custSlots.length < n) custSlots.push('#CCCCCC');
  custSlots = custSlots.slice(0, n);
  custActiveSlot = 0;
  renderCustSlots();
  updateCustPreview();
}

function renderCustSlots() {
  const row = document.getElementById('custSlots');
  if (!row) return;
  row.innerHTML = custSlots.map((c, i) => `
    <div class="cust-slot ${i===custActiveSlot?'active-slot':''}"
      style="background:${c};"
      onclick="setCustActiveSlot(${i})">
      ${i+1}
    </div>`).join('');
}

function setCustActiveSlot(i) {
  custActiveSlot = i;
  renderCustSlots();
  document.querySelectorAll('.cust-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === custSlots[i]);
  });
}

function selectCustColor(swatch) {
  const color = swatch.dataset.color;
  custSlots[custActiveSlot] = color;
  if (custActiveSlot < custLayout - 1) custActiveSlot++;
  renderCustSlots();
  updateCustPreview();
  document.querySelectorAll('.cust-swatch').forEach(s => s.classList.remove('selected'));
  swatch.classList.add('selected');
}

function updateCustPreview() {
  const el = document.getElementById('custPreview');
  if (!el) return;
  el.innerHTML = colorCircleSVG({ layout: custLayout, colors: custSlots }, 36);
}

function addProductToCart() {
  const panel = document.getElementById('customPanel');
  const isCustom = panel && panel.classList.contains('open');
  const price = (product.price || 0) + (isCustom ? (product.custom_price || 0) : 0);
  const name = isCustom
    ? `${product.name} (individuell: ${custSlots.join(', ')})`
    : product.name;
  const img = product.images && product.images[0] ? getImageUrl(product.images[0]) : '';
  addToCart(product.id + (isCustom ? '_custom' : ''), name, price, img);
  openCart();
}

// Burger
function toggleBurger() {
  const dd = document.getElementById('burgerDropdown');
  const btn = document.getElementById('burgerBtn');
  dd.classList.toggle('open');
  btn.classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const dd = document.getElementById('burgerDropdown');
  const btn = document.getElementById('burgerBtn');
  if (dd && btn && !btn.contains(e.target) && !dd.contains(e.target)) {
    dd.classList.remove('open');
    btn.classList.remove('open');
  }
});

loadProduct();
</script>
</body>
</html>
