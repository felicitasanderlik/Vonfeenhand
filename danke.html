<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Danke – von Feenhand</title>
<link rel="stylesheet" href="style.css">
<style>
  .danke-wrap {
    text-align: center;
    padding: 1.5rem;
    max-width: 560px;
    margin: 0 auto;
  }
  .danke-emoji { font-size: 3rem; display: block; margin-bottom: 1rem; }
  .bank-box {
    background: var(--sage-pale);
    border: 1px solid #e0dbd5;
    border-radius: 12px;
    padding: 1.5rem;
    text-align: left;
    margin-bottom: 2rem;
    font-size: 0.85rem;
    line-height: 1.8;
  }
  .btn-weiter {
    display: block; width: 100%;
    background: #6b8f6b; color: white;
    text-align: center; padding: 16px;
    border-radius: 4px; font-size: 14px;
    letter-spacing: 0.1em; cursor: pointer;
    text-decoration: none;
    font-family: 'Jost', sans-serif;
  }
</style>
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
<div class="page-content">
  <div class="danke-wrap">
    <span class="danke-emoji">🎉</span>
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin-bottom:0.5rem;" id="dankeTitle">Danke!</h1>
    <p style="color:var(--text-light);margin-bottom:0.5rem;" id="dankeOrder"></p>
    <p style="color:var(--text-light);margin-bottom:2rem;" id="dankeEmail"></p>
    <div class="bank-box" id="bankBox" style="display:none;">
      <strong>Bankdaten für die Überweisung:</strong><br>
      Inhaberin: Felicitas Anderlik<br>
      IBAN: AT12 3456 7890 1234 5678<br>
      Verwendungszweck: <span id="bankVwz"></span>
    </div>
    <a href="shop.html" class="btn-weiter">WEITER EINKAUFEN</a>
  </div>
</div>
<script src="header.js"></script>
<script src="app.js"></script>
<script>
  // Daten aus sessionStorage laden
  const d = JSON.parse(sessionStorage.getItem('vfh_order') || '{}');
  sessionStorage.removeItem('vfh_order');

  if (d.name) { const firstName = d.name.trim().split(/\s+/)[0]; document.getElementById('dankeTitle').textContent = 'Danke, ' + firstName + '!'; }
  if (d.orderId) {
    document.getElementById('dankeOrder').innerHTML = 'Deine Bestellung <strong>#' + d.orderId + '</strong> wurde erfolgreich aufgegeben.';
    document.getElementById('bankVwz').textContent = 'Bestellung #' + d.orderId;
  }
  if (d.email) document.getElementById('dankeEmail').innerHTML = 'Du erhältst eine Bestätigung an <strong>' + d.email + '</strong>.';
  if (d.payment === 'transfer') document.getElementById('bankBox').style.display = 'block';

  // IBAN laden
  const SB_URL_D = 'https://uveihedjoqrdejycqqeu.supabase.co';
  const SB_KEY_D = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2ZWloZWRqb3FyZGVqeWNxcWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTA4MDYsImV4cCI6MjA5MTQ4NjgwNn0.H6k7qrc_YMWgvKDqk-_nIYKQjJqVogBgx6EUFOTIhvo';
  fetch(SB_URL_D + '/rest/v1/settings?key=eq.contact_iban', {
    headers: { 'apikey': SB_KEY_D, 'Authorization': 'Bearer ' + SB_KEY_D }
  }).then(r => r.json()).then(data => {
    if (data && data[0] && document.getElementById('dankeIban')) {
      document.getElementById('dankeIban').textContent = data[0].value;
    }
  }).catch(()=>{});

  launchConfetti();
</script>
</body>
</html>
